# .github/workflows/scraper.yml
# ─────────────────────────────────────────────────────────────────────────────
# Automated Motivated Seller Lead Scraper — Orange County, FL
# Runs on a schedule (daily at 6 AM ET) and on manual dispatch.
# Outputs are committed back to the repository so the dashboard
# is always up-to-date via GitHub Pages.
# ─────────────────────────────────────────────────────────────────────────────

name: Scrape OC Motivated Seller Leads

on:
  schedule:
    # 6 AM ET (11:00 UTC) every day
    - cron: "0 11 * * *"
  workflow_dispatch:   # allow manual runs from the GitHub UI

permissions:
  contents: write      # needed to commit output files back to the repo

jobs:
  scrape:
    name: Scrape & Generate Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      # ── 4. Create required directories ────────────────────────────────────
      - name: Create output directories
        run: |
          mkdir -p data dashboard

      # ── 5. Run the scraper ────────────────────────────────────────────────
      - name: Run scraper
        run: python src/scraper.py
        env:
          # Add any secrets here if the portal requires authentication
          # PORTAL_USERNAME: ${{ secrets.PORTAL_USERNAME }}
          # PORTAL_PASSWORD: ${{ secrets.PORTAL_PASSWORD }}
          PYTHONUNBUFFERED: "1"

      # ── 6. Validate outputs ───────────────────────────────────────────────
      - name: Validate outputs
        run: |
          python - <<'EOF'
          import json, sys, os
          # Check JSON
          path = "data/output.json"
          if not os.path.exists(path):
              print("ERROR: data/output.json not found"); sys.exit(1)
          with open(path) as f:
              data = json.load(f)
          n = data.get("total_records", 0)
          print(f"✓ JSON valid — {n} records")
          # Check dashboard
          if not os.path.exists("dashboard/index.html"):
              print("ERROR: dashboard/index.html not found"); sys.exit(1)
          print("✓ Dashboard HTML present")
          EOF

      # ── 7. Commit & push results ──────────────────────────────────────────
      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/output.json dashboard/index.html
          git diff --cached --quiet || git commit -m "chore: auto-update leads $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 8. Upload artifacts (for inspection without cloning) ──────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lead-output-${{ github.run_id }}
          path: |
            data/output.json
            dashboard/index.html
          retention-days: 30
